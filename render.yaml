# Render Blueprint — step-by-step: docs/RENDER_EASY.md
# Set secrets in the Render dashboard (never commit real keys).
# https://render.com/docs/blueprint-spec
#
# First deploy (no Stripe): set OPENAI_API_KEY, CORS_ORIGINS, FRONTEND_URL in dashboard.
# Billing later: BILLING_ENABLED=true + Stripe vars (see backend/.env.example).
#
# Stripe webhook (when billing on): https://<this-host>/api/billing/webhook
# Events: checkout.session.completed, customer.subscription.updated, customer.subscription.deleted, invoice.payment_failed
services:
  - type: web
    name: cloneai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # Easier first launch — turn on Stripe vars in dashboard when ready.
      - key: BILLING_ENABLED
        value: "false"
      # Set these in Render UI (Blueprint “sync: false” = value only on dashboard):
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
