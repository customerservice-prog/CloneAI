# Render Blueprint — docs/RENDER_EASY.md · full launch: docs/LAUNCH_PHASES.md
# Set secrets in the Render dashboard (never commit real keys).
# https://render.com/docs/blueprint-spec
#
# First deploy: set OPENAI_API_KEY. CORS + FRONTEND_URL default for siteclonerpro.com.
# Billing (Phase 4): BILLING_ENABLED=true + Stripe (see backend/.env.example).
# TRUST_PROXY=1: correct client IP / HTTPS behind Cloudflare+Render (use 2 if double proxy).
#
# Stripe webhook: https://<this-host>/api/billing/webhook
# Events: checkout.session.completed, customer.subscription.updated, customer.subscription.deleted, invoice.payment_failed
# npm run stripe-webhook:create -- https://<host>/api/billing/webhook
services:
  - type: web
    name: cloneai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: PORT
        value: "3001"
      # Easier first launch — turn on Stripe vars in dashboard when ready.
      - key: BILLING_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: "https://www.siteclonerpro.com,https://siteclonerpro.com"
      - key: FRONTEND_URL
        value: "https://www.siteclonerpro.com"
      - key: OPENAI_API_KEY
        sync: false
