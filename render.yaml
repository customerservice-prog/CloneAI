# Render Blueprint — GitHub repo → Render deploys both services. Docs: docs/RENDER_EASY.md,
# docs/NAMECHEAP_RENDER.md (Namecheap DNS). Set secrets in the dashboard (never commit keys).
# https://render.com/docs/blueprint-spec
#
# Services: cloneai-api (Node + embedded SPA), cloneai-web (optional static). Recommended stack with
# Namecheap: DNS only at registrar; no Vercel required.
#
# cloneai-api below uses Native Node from repo root (build embeds SPA + Playwright). If your dashboard
# still has Root Directory = backend and build = "npm ci && playwright…" only, you get API-only (no public/index.html).
# Fix: Root Directory = (empty / repo root), Build = npm run render:backend-with-spa, Start = npm start --prefix backend
# — or keep Root Directory = backend and set Build = cd .. && npm run render:backend-with-spa
#
# Optional: deploy repo-root Dockerfile instead (Dashboard → Docker, dockerfilePath ./Dockerfile, context .).
#
# First deploy: set OPENAI_API_KEY in the dashboard (sync: false).
# CORS_ORIGINS must list every browser origin (apex + www). FRONTEND_URL = canonical site (Stripe redirects).
# Billing: BILLING_ENABLED=true requires Stripe secrets + price IDs in the dashboard; without them checkout returns 503.
# Persistent disk is mounted at /data; BILLING_DATA_PATH, ANALYSIS_ARCHIVE_DIR, LEADS_DATA_PATH point there.
# TRUST_PROXY=1: correct client IP / HTTPS behind Render’s proxy (use 2 if CDN + Render).
# Ingress: set CLONEAI_INGRESS_KEY (or VITE_CLONEAI_KEY) on cloneai-api — publish-spa-to-backend.mjs mirrors it into the Vite build. cloneai-web: set VITE_* in env for static builds.
# If apex DNS points at cloneai-api by mistake, set STATIC_APP_URL on the API to cloneai-web’s
# public https URL (Dashboard → cloneai-web → URL) so GET / redirects browsers to the SPA until DNS is fixed.
#
# cloneai-web: set VITE_API_URL to cloneai-api’s public https URL (dashboard) if it differs
# from the value below.
#
# Stripe webhook: https://<this-host>/api/billing/webhook
# Events: checkout.session.completed, customer.subscription.updated, customer.subscription.deleted, invoice.payment_failed
# npm run stripe-webhook:create -- https://<host>/api/billing/webhook
services:
  - type: web
    name: cloneai-api
    runtime: node
    plan: starter
    healthCheckPath: /api/health
    buildCommand: npm run render:backend-with-spa
    startCommand: npm start --prefix backend
    disk:
      name: cloneai-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: BILLING_DATA_PATH
        value: /data/billing.json
      - key: ANALYSIS_ARCHIVE_DIR
        value: /data/analyses
      - key: LEADS_DATA_PATH
        value: /data/leads.jsonl
      - key: TRUST_PROXY
        value: "1"
      # Do not set PORT — Render injects it; the API must listen on that port only.
      # When BILLING_ENABLED=true, set in the dashboard (secrets): STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
      # STRIPE_PRICE_STARTER, STRIPE_PRICE_PRO, STRIPE_PRICE_EXTRA_RUN; optional STRIPE_PRICE_POWER, STRIPE_PRICE_DEEP_EXTRACT.
      # Stripe webhook URL: https://<api-host>/api/billing/webhook
      # Optional promo: CLONEAI_PROMO_CODE
      # If set, same value is baked into the SPA at build time (X-CloneAI-Key). Optional override: VITE_CLONEAI_KEY.
      - key: CLONEAI_INGRESS_KEY
        sync: false
      - key: VITE_CLONEAI_KEY
        sync: false
      - key: BILLING_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "https://siteclonerpro.com,https://www.siteclonerpro.com,https://cloneai-web.onrender.com"
      - key: FRONTEND_URL
        value: "https://siteclonerpro.com"
      # If apex hits API-only (no public/) or misconfigured build, redirect to static host. When SPA is embedded, usually unused.
      # GET / also redirects when the request Host appears in CORS_ORIGINS and differs from STATIC_APP_URL (covers FRONTEND_URL typos).
      - key: STATIC_APP_URL
        value: "https://cloneai-web.onrender.com"
      # When the apex hostname hits the API but the SPA is on cloneai-web, redirect browsers (backup if STATIC_APP_URL is missing in dashboard).
      - key: APEX_STATIC_FALLBACK_URL
        value: "https://cloneai-web.onrender.com"
      - key: OPENAI_API_KEY
        sync: false

  # Optional second static site — skip or delete if cloneai-api already serves the SPA from backend/public.
  - type: web
    name: cloneai-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Canonical app origin when API serves the SPA; use *.onrender.com only if the API stays on that host alone.
      - key: VITE_API_URL
        value: "https://siteclonerpro.com"
      - key: VITE_PUBLIC_APP_URL
        value: "https://siteclonerpro.com"
      # Match CLONEAI_INGRESS_KEY on cloneai-api when ingress is enabled (or leave both unset).
      - key: VITE_CLONEAI_KEY
        sync: false
