# Render Blueprint — GitHub repo → Render deploys both services. Docs: docs/RENDER_EASY.md,
# docs/NAMECHEAP_RENDER.md (Namecheap DNS). Set secrets in the dashboard (never commit keys).
# https://render.com/docs/blueprint-spec
#
# Services: cloneai-api (Docker), cloneai-web (static Vite app). Recommended stack with
# Namecheap: DNS only at registrar; no Vercel required.
#
# If your Render service uses Native Node + "npm start" (backend/) instead of Docker, set:
#   Root Directory = (repo root, empty)
#   Build Command  = npm run render:backend-with-spa
#   Start Command  = npm start --prefix backend
# That copies the built SPA into backend/public so siteclonerpro.com serves the app + API.
#
# First deploy: set OPENAI_API_KEY in the dashboard (sync: false).
# CORS_ORIGINS must list every browser origin (apex + www). FRONTEND_URL = canonical site (Stripe redirects).
# Billing: BILLING_ENABLED=true requires Stripe secrets + price IDs in the dashboard; without them checkout returns 503.
# Persistent disk at /app/data: default billing.json + analysis archive paths (under WORKDIR /app) survive redeploys.
# TRUST_PROXY=1: correct client IP / HTTPS behind Render’s proxy (use 2 if CDN + Render).
# VITE_* vars belong on cloneai-web (static build only), not on cloneai-api.
# If apex DNS points at cloneai-api by mistake, set STATIC_APP_URL on the API to cloneai-web’s
# public https URL (Dashboard → cloneai-web → URL) so GET / redirects browsers to the SPA until DNS is fixed.
#
# cloneai-web: set VITE_API_URL to cloneai-api’s public https URL (dashboard) if it differs
# from the value below.
#
# Stripe webhook: https://<this-host>/api/billing/webhook
# Events: checkout.session.completed, customer.subscription.updated, customer.subscription.deleted, invoice.payment_failed
# npm run stripe-webhook:create -- https://<host>/api/billing/webhook
services:
  - type: web
    name: cloneai-api
    runtime: docker
    # Repo-root image: API + built SPA in /app/public (apex can point here without a second service).
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: cloneai-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      # Do not set PORT — Render injects it; the API must listen on that port only.
      # When BILLING_ENABLED=true, set in the dashboard (secrets): STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
      # STRIPE_PRICE_STARTER, STRIPE_PRICE_PRO, STRIPE_PRICE_EXTRA_RUN; optional STRIPE_PRICE_POWER, STRIPE_PRICE_DEEP_EXTRACT.
      # Stripe webhook URL: https://<api-host>/api/billing/webhook
      # Optional promo: CLONEAI_PROMO_CODE
      - key: BILLING_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "https://siteclonerpro.com,https://www.siteclonerpro.com,https://cloneai-web.onrender.com"
      - key: FRONTEND_URL
        value: "https://siteclonerpro.com"
      # If apex DNS hits this service but the image is API-only (no public/), redirect browsers to the static service.
      # Monolith image (repo-root Dockerfile) includes the SPA — then this redirect is unused. Override if your static URL differs.
      - key: STATIC_APP_URL
        value: "https://cloneai-web.onrender.com"
      # If apex hits the API but www (or another host) serves the SPA, set this so GET / redirects browsers there.
      # Example: https://www.siteclonerpro.com after adding www on cloneai-web in Render.
      - key: APEX_STATIC_FALLBACK_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Optional second static site — skip or delete on Render if cloneai-api serves the SPA (repo-root Dockerfile).
  - type: web
    name: cloneai-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Canonical app origin when API serves the SPA; use *.onrender.com only if the API stays on that host alone.
      - key: VITE_API_URL
        value: "https://siteclonerpro.com"
      - key: VITE_PUBLIC_APP_URL
        value: "https://siteclonerpro.com"
